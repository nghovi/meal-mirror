<VirtualHost *:80>
    ServerName meal-mirror-api.truongdiem.online

    Alias /.well-known/acme-challenge/ /var/www/acme-challenge/.well-known/acme-challenge/
    <Directory /var/www/acme-challenge/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass /.well-known/acme-challenge/ !
    ProxyPass / http://127.0.0.1:8787/
    ProxyPassReverse / http://127.0.0.1:8787/

    ErrorLog /var/log/httpd/meal-mirror-api-error.log
    CustomLog /var/log/httpd/meal-mirror-api-access.log combined
</VirtualHost>
