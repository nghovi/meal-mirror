<VirtualHost *:443>
    ServerName meal-mirror-api.truongdiem.online

    SSLEngine on
    SSLCertificateFile /etc/ssl/private/meal-mirror-api-fullchain.crt
    SSLCertificateKeyFile /etc/ssl/private/meal-mirror-api.key

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://127.0.0.1:8787/
    ProxyPassReverse / http://127.0.0.1:8787/

    ErrorLog /var/log/httpd/meal-mirror-api-ssl-error.log
    CustomLog /var/log/httpd/meal-mirror-api-ssl-access.log combined
</VirtualHost>
