<VirtualHost *:80>
    ServerName ankieng.truongdiem.online

    Alias /.well-known/acme-challenge/ /var/www/acme-challenge/.well-known/acme-challenge/
    <Directory /var/www/acme-challenge/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://ankieng.truongdiem.online%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName ankieng.truongdiem.online

    DocumentRoot /var/www/ankieng
    DirectoryIndex index.html
    DirectorySlash Off

    SSLEngine on
    SSLCertificateFile /etc/ssl/private/ankieng-stage-fullchain.crt
    SSLCertificateKeyFile /etc/ssl/private/ankieng-stage.key

    <Directory /var/www/ankieng>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    Alias /privacy /var/www/ankieng/privacy/index.html

    ErrorLog /var/log/httpd/ankieng-error.log
    CustomLog /var/log/httpd/ankieng-access.log combined
</VirtualHost>
